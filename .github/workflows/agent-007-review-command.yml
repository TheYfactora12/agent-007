name: Agent-007 Review Command

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  review-command:
    if: >
      github.event.issue.pull_request &&
      github.event.comment.body == '/agent007 review'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout trusted default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build review packet
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          node scripts/agent-007-review-command.mjs
          --event "$GITHUB_EVENT_PATH"
          > review-packet.md

      - name: Post review packet comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh pr comment ${{ github.event.issue.number }}
          --repo ${{ github.repository }}
          --body-file review-packet.md
